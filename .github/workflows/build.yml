name: Build TubeScoop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.1)"
        required: false
        default: "nightly"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: python build_portable.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubeScoop-Windows-${{ github.ref_name || inputs.version }}
          path: dist/TubeScoop.exe